<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Solar panels on carport structure -->
  <g transform="translate(200,120)" opacity="0.9">
    <!-- Carport roof / solar panels -->
    <polygon points="0,60 400,0 800,60 400,120" fill="#de0e14" opacity="0.3"/>
    <polygon points="0,60 400,0 800,60 400,120" fill="none" stroke="#de0e14" stroke-width="2"/>
    <!-- Panel grid lines -->
    <line x1="100" y1="45" x2="300" y2="75" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <line x1="300" y1="15" x2="500" y2="45" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <line x1="500" y1="45" x2="700" y2="75" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <line x1="200" y1="75" x2="400" y2="105" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <line x1="400" y1="45" x2="600" y2="75" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <line x1="600" y1="75" x2="800" y2="105" stroke="#de0e14" stroke-width="0.5" opacity="0.4"/>
    <!-- Support columns -->
    <rect x="140" y="120" width="8" height="160" fill="#de0e14" opacity="0.25"/>
    <rect x="390" y="120" width="8" height="160" fill="#de0e14" opacity="0.25"/>
    <rect x="650" y="120" width="8" height="160" fill="#de0e14" opacity="0.25"/>
    <!-- Cars underneath -->
    <rect x="180" y="210" width="120" height="50" rx="25" fill="#2a2a4a" stroke="#de0e14" stroke-width="0.8" opacity="0.4"/>
    <rect x="460" y="210" width="120" height="50" rx="25" fill="#2a2a4a" stroke="#de0e14" stroke-width="0.8" opacity="0.4"/>
  </g>
  <text x="600" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#de0e14" opacity="0.6">Ombrière Photovoltaïque</text>
</svg>
